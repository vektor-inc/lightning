name: Queue task

on:
  issues:
    types: [labeled]

jobs:
  queue:
    if: github.event.label.name == 'task-queue'
    runs-on: ubuntu-latest
    steps:
      - name: Create issue in task-queue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TASK_QUEUE_TOKEN }}
          script: |
            const issue  = context.payload.issue;
            const repo   = context.payload.repository;
            const labels = issue.labels.map(l => l.name);

            const execType = labels.includes('parallel') ? 'parallel' : 'sequential';
            const priority = labels.find(l => l.startsWith('priority:')) || null;

            const taskLabels = ['status:pending', execType];
            if (priority) taskLabels.push(priority);

            // 重複チェック
            const existing = await github.rest.issues.listForRepo({
              owner: 'vektor-inc',
              repo:  'task-queue',
              state: 'open',
              per_page: 100,
            });
            if (existing.data.some(i => i.body?.includes(issue.html_url))) {
              console.log('既に task-queue に登録済みです');
              return;
            }

            const { data } = await github.rest.issues.create({
              owner:  'vektor-inc',
              repo:   'task-queue',
              title:  `[${repo.name}] ${issue.title}`,
              body:   issue.html_url,
              labels: taskLabels,
            });
            console.log(`✅ task-queue issue #${data.number} を作成: ${data.html_url}`);
